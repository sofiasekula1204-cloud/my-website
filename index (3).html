<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Форма реєстрації та Зворотний зв'язок</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Стилізація body */
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            color: #333;
        }

        /* Стилі для заголовків */
        h1 {
            color: #0056b3;
            text-align: center;
            margin-bottom: 20px;
        }

        h2 {
            color: #333;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 10px;
            margin-top: 40px;
        }

        /* Стилі для форми та її елементів */
        form {
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            margin: 0 auto 40px auto;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box; /* Щоб padding не виходив за межі ширини */
        }

        button {
            background-color: #0056b3;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }

        button:hover {
            background-color: #003d80;
        }

        /* Стилі для відео */
        video {
            display: block;
            margin: 20px auto;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        /* Стилі для посилань */
        a {
            color: #0056b3;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>Мої улюблені книги</h1>

    <h2>Форма реєстрації</h2>
    <form>
        <label for="firstName">Ім’я:</label>
        <input type="text" id="firstName" name="firstName">

        <label for="lastName">Прізвище:</label>
        <input type="text" id="lastName" name="lastName">

        <label for="email_reg">Електронна пошта:</label>
        <input type="email" id="email_reg" name="email">

        <label for="password">Пароль:</label>
        <input type="password" id="password" name="password">

        <label for="confirmPassword">Підтвердження пароля:</label>
        <input type="password" id="confirmPassword" name="confirmPassword">

        <label for="age_reg">Вік:</label>
        <input type="number" id="age_reg" name="age" min="1" max="100">

        <label for="gender">Стать:</label>
        <select id="gender" name="gender">
            <option value="male">Чоловіча</option>
            <option value="female">Жіноча</option>
            <option value="other">Інша</option>
        </select>

        <label for="terms">
            <input type="checkbox" id="terms" style="width: auto; margin-right: 10px;">
            Я погоджуюсь з умовами використання
        </label>

        <button type="submit">Зареєструватися</button>
    </form>

    <hr>

    <h2>Де купити ці книги</h2>
    <p>Ви можете придбати ці книги на <a href="https://www.amazon.com/" target="_blank">Amazon</a>, <a href="https://yakaboo.ua/" target="_blank">Yakaboo</a> або <a href="https://book-ye.com.ua/" target="_blank">Книгарня "Є"</a>.</p>

    <h2>Відео про книги</h2>
    <video controls width="500" height="300">
        <source src="book_trailer.mp4" type="video/mp4">
        Ваш браузер не підтримує відтворення відео.
    </video>

    <h2>Зворотний зв’язок</h2>
    <form action="submit_form.php" method="post">
        <label for="name">Ім’я:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Електронна пошта:</label>
        <input type="email" id="email" name="email" required>

        <label for="age">Вік:</label>
        <input type="number" id="age" name="age" min="0" required>

        <label for="message">Повідомлення:</label>
        <textarea id="message" name="message" rows="4" required></textarea>

        <button type="submit">Відправити</button>
    </form>

</body>
</html>
